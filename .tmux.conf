# True color support (24-bit)
set -g default-terminal "xterm-kitty"
# True color + undercurl/styled underline capabilities for Kitty
set -g terminal-overrides "xterm-kitty:RGB,xterm-kitty:Tc"

# Allow OSC 52 passthrough so clipboard sequences reach the local terminal
set -g allow-passthrough on
set -g set-clipboard on

# Make mouse wheel scroll tmux pane history instead of zsh command history
set -g mouse on

# Keep a larger scrollback buffer for long command output
set -g history-limit 100000

# Join next window into current as a side-by-side pane; break current pane back out
bind v join-pane -h -s :+
bind b break-pane

# Reproducible cockpit customization
source-file ~/Projects/tmux-cockpit/tmux/cockpit.tmux
