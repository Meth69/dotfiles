# Kitty Configuration

# Font
font_family      Fira Code
font_size        11.0
disable_ligatures never

# Nerd Fonts symbol fallback (for yazi icons, powerline, etc.)
symbol_map U+23FB-U+23FE,U+2B58,U+E000-U+E00A,U+E0A0-U+E0A3,U+E0B0-U+E0C8,U+E0CA,U+E0CC-U+E0D4,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E6B1,U+E700-U+E7C5,U+EA60-U+EBEB,U+F000-U+F2FF,U+F300-U+F372,U+F400-U+F532,U+F0001-U+F1AF0 Symbols Nerd Font

# Color theme — managed in current-theme.conf for easy switching.
include current-theme.conf

# Window
background_opacity 0.9
window_padding_width 4

# Tab bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Cursor
cursor_shape beam
cursor_blink_interval 0

# Mouse
copy_on_select yes

# Bell
# Disable Kitty's built-in audio bell; play the selected alert through paplay instead.
enable_audio_bell no
command_on_bell paplay /usr/share/sounds/freedesktop/stereo/dialog-warning.oga

# Shell integration
shell_integration enabled

# Layouts
enabled_layouts splits,stack,tall,fat

# Keybindings (Italian keyboard friendly)
# Navigate between windows
map ctrl+shift+right next_window
map ctrl+shift+left previous_window
map alt+shift+right next_window
map alt+shift+left previous_window

# Navigate between tabs
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab

# Launch new window / splits in current cwd
map ctrl+shift+enter launch --cwd=current
map ctrl+shift+d launch --location=vsplit --cwd=current
map ctrl+shift+e launch --location=hsplit --cwd=current

# Cycle layouts
map ctrl+shift+space next_layout
